#####################################################################
#   Macros
#####################################################################
[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(65)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(215)|float %}
    {% set CHAMBER_TEMP = params.CHAMBER|default(25)|float %}
    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
    M140 S{BED_TEMP}               # Start heating bed for probing
    M104 S{EXTRUDER_TEMP * 0.6}    # Start heating nozzle to 60%
    G32                            # Home all axes and z tilt
    G90                            # Use absolute coordinates

    # Check if the bed temp is higher than 90c - if so then trigger a heatsoak.
    {% if params.BED_TEMP|int > 90 %}
      SET_DISPLAY_TEXT MSG="Bed: {BED_TEMP}c"           # Display info on display
      STATUS_HEATING                                      # Set LEDs to heating-mode
      G1 X{x_wait} Y{y_wait} Z15 F9000                    # Go to center of the bed
      M106 S255                                           # Turn on the PT-fan
      M190 S{BED_TEMP}                                  # Set the target temp for the bed
      SET_DISPLAY_TEXT MSG="Heatsoak: {CHAMBER_TEMP}c"  # Display info on display
      TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={CHAMBER_TEMP}   # Waits for chamber temp
      M107                                                  # Turn off partcooling fan
    # If the bed temp is not over 90c, then skip the heatsoak and just heat up to set temp
    {% else %}
      SET_DISPLAY_TEXT MSG="Bed: {BED_TEMP}c"           # Display info on display
      STATUS_HEATING                                      # Set LEDs to heating-mode
      M190 S{BED_TEMP}                                  # Set the target temp for the bed
    {% endif %}

    SET_DISPLAY_TEXT MSG="Bed mesh"                      # Display info on display
    STATUS_MESHING                                       # Set LEDs to bed mesh-mode
    CALIBRATE_Z                    # Auto Z offset height calibration
    BED_MESH_CLEAR                 # Clear old saved bed mesh (if any)
    BED_MESH_CALIBRATE ADAPTIVE=1  # Create adaptive bed mesh
    SMART_PARK                     # Park toolhead close to print loaciton
    SET_DISPLAY_TEXT MSG="Hotend: {EXTRUDER_TEMP}c"     # Display info on display
    STATUS_HEATING                 #SB LEDs
    M109 S{EXTRUDER_TEMP}    # Set and wait for nozzle to reach printing temperature
    STATUS_PRINTING              #SB LEDs
    LINE_PURGE
    
    
#####################################################################
[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 5, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-6.0 F3600                 ; retract filament
    STATUS_READY                 #SB LEDs
    TURN_OFF_HEATERS
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107                                     ; turn off fan
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    
#####################################################################
[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    HOME_CHECK
    CONDITIONAL_Z_TILT          #Z_TILT_ADJUST
    ##  Uncomment for 250mm build
    # G0 X125 Y125 Z30 F3600    # uncommented to remove extra toolhead moves
    RESTORE_GCODE_STATE NAME=STATE_G32
    
#####################################################################
[gcode_macro HOME_CHECK]
description: Checks if the printer is homed, it not it homes the printer
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
  STATUS_HOMING                 #SB LEDs
  G28
  STATUS_READY                 #SB LEDs
  {% endif %}

#####################################################################
[gcode_macro CONDITIONAL_Z_TILT]
gcode:
  {% if printer.z_tilt.applied == False %}
    {% if "xyz" not in printer.toolhead.homed_axes %}
        STATUS_HOMING                 #SB LEDs
        M118Homing needed, homing XYZ
        G28                       ; home if not already homed
        STATUS_READY                 #SB LEDs
    {% endif %}
    STATUS_HOMING                 #SB LEDs
    M118Z-tilt needed, now starting Z-tilt adjustment
    Z_TILT_ADJUST
    STATUS_READY                 #SB LEDs
 {% endif %}
   
#####################################################################
[gcode_macro UNLOAD_FILAMENT]
description: Checks home, heats, purges and retracts filament for unload
variable_unload_distance:  50
variable_purge_distance:  25
variable_max_cycles:  40
gcode:
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    {% set max_cycles = printer["gcode_macro UNLOAD_FILAMENT"].variable_max_cycles %}
    SAVE_GCODE_STATE NAME=unload_state
    M104 S{150}    # Start heating nozzle 
    HOME_CHECK
    G90                                      ; absolute positioning
    G0 X{125} Y{5} Z{40} F20000  ; move nozzle to front of printer
    M109 S{250}
    STATUS_PRINTING              #SB LEDs
    G91
    G92 E0
    G1 E{purge_distance} F{speed} # purge
    
    # G1 E-{unload_distance} F{max_velocity} # fast-unload

    {% set cycles = 0 %}
    {% for cycles in range(max_cycles) %}
        {%if printer.filament_switch_sensor.bottom_sensor.filament_detected %}
            G1 E-{5} F{max_velocity}
            M400
            {% set cycles = cycles + 1 %}
        {% endif %}
    {% endfor %}
    
    TURN_OFF_HEATERS
    STATUS_READY                 #SB LEDs
    RESTORE_GCODE_STATE NAME=unload_state
    #####################################################################
[gcode_macro LOAD_FILAMENT]
description: Checks home, heats, purges and loads filament
variable_load_distance:  50
variable_purge_distance:  25
variable_retract_distance: 15
gcode:
    {% set speed = params.SPEED|default(300) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity  * 60 %}
    SAVE_GCODE_STATE NAME=load_state
    M104 S{150}    # Start heating nozzle 
    HOME_CHECK
    G90                                      ; absolute positioning
    G0 X{125} Y{5} Z{40} F20000  ; move nozzle to front of printer
    M109 S{250}
    STATUS_PRINTING              #SB LEDs
    G91
    G92 E0
    G1 E{load_distance} F{max_velocity} # fast-load
    G1 E{purge_distance} F{speed} # purge
    G1 E-{retract_distance} F{max_velocity} # fast-retract
    TURN_OFF_HEATERS
    STATUS_READY                 #SB LEDs
    RESTORE_GCODE_STATE NAME=load_state
    #####################################################################
