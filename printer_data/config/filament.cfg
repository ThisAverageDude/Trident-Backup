#####################################################################
[gcode_macro _CURRENT_FILAMENT]
description: Stores the currently loaded filament type - dynamically references _FILAMENT_LIBRARY
variable_type: 'PLA'
gcode:
    # Variable storage only - type references _FILAMENT_LIBRARY.filaments

#####################################################################
[gcode_macro LIST_FILAMENTS]
description: Display all available filaments and their temperatures
gcode:
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    {action_respond_info("="*60)}
    {action_respond_info("AVAILABLE FILAMENTS")}
    {action_respond_info("="*60)}
    {% for filament in filaments|sort %}
        {% set info = filaments[filament] %}
        {action_respond_info("%s: %s" % (filament.ljust(10), info.name))}
        {action_respond_info("  Nozzle: %d°C | Bed: %d°C | Speed: %d mm/s" % (info.temp, info.bed_temp, info.load_speed))}
        {action_respond_info("  %s" % info.description)}
        {action_respond_info("")}
    {% endfor %}
    {action_respond_info("="*60)}
    {action_respond_info("Usage: SET_FILAMENT_TYPE TYPE=<filament_name>")}
    {action_respond_info("="*60)}

#####################################################################
[gcode_macro SET_FILAMENT_TYPE]
description: Set filament type - TYPE=<filament_code>
gcode:
    {% set filament_type = params.TYPE|default('')|string|upper %}
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    # Check if filament type is provided
    {% if filament_type == '' %}
        {action_raise_error("No filament type specified. Use: SET_FILAMENT_TYPE TYPE=<name>\nRun LIST_FILAMENTS to see available options.")}
    {% endif %}
    
    # Validate filament type
    {% if filament_type not in filaments %}
        {action_raise_error("Unknown filament type: %s\nValid types: %s" % (filament_type, ', '.join(filaments|sort)))}
    {% endif %}
    
    {% set filament_info = filaments[filament_type] %}
    
    # Store the filament type (references object in _FILAMENT_LIBRARY)
    SET_GCODE_VARIABLE MACRO=_CURRENT_FILAMENT VARIABLE=type VALUE="'{filament_type}'"
    
    SET_DISPLAY_TEXT MSG="Filament: {filament_info.name} ({filament_type})"
    {action_respond_info("✓ Filament type set to: %s (%s)" % (filament_info.name, filament_type))}
    {action_respond_info("  Nozzle temp: %d°C | Bed temp: %d°C" % (filament_info.temp, filament_info.bed_temp))}

#####################################################################
[gcode_macro GET_FILAMENT_INFO]
description: Display current filament information
gcode:
    {% set current_type = printer["gcode_macro _CURRENT_FILAMENT"].type %}
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    # Validate current type exists in library
    {% if current_type not in filaments %}
        {action_raise_error("Invalid filament type: %s. Run SET_FILAMENT_TYPE TYPE=<name> first." % current_type)}
    {% endif %}
    
    {% set info = filaments[current_type] %}
    
    {action_respond_info("="*60)}
    {action_respond_info("CURRENT FILAMENT")}
    {action_respond_info("="*60)}
    {action_respond_info("Type: %s (%s)" % (info.name, current_type))}
    {action_respond_info("Nozzle Temperature: %d°C (±%d°C)" % (info.temp, info.tolerance))}
    {action_respond_info("Bed Temperature: %d°C" % info.bed_temp)}
    {action_respond_info("Load Speed: %d mm/s" % info.load_speed)}
    {action_respond_info("Description: %s" % info.description)}
    {action_respond_info("="*60)}

#####################################################################
[gcode_macro LOAD_FILAMENT]
description: Load filament - uses currently selected filament type
variable_load_distance: 50
variable_purge_distance: 25
variable_retract_distance: 15

gcode:
    {% set current_type = printer["gcode_macro _CURRENT_FILAMENT"].type %}
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    # Validate and get current filament info from library
    {% if current_type not in filaments %}
        {action_raise_error("Invalid filament type set: %s. Run SET_FILAMENT_TYPE TYPE=<name> first." % current_type)}
    {% endif %}
    
    {% set info = filaments[current_type] %}
    {% set target_temp = info.temp %}
    {% set tolerance = info.tolerance %}
    {% set load_speed = info.load_speed %}
    {% set display_name = info.name %}
    
    {% set speed = params.SPEED|default(load_speed) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 60 %}
    
    SAVE_GCODE_STATE NAME=load_state
    
    # Display loading information
    SET_DISPLAY_TEXT MSG="LOAD: {current_type}"
    {action_respond_info("="*60)}
    {action_respond_info("LOADING FILAMENT: %s" % display_name)}
    {action_respond_info("="*60)}
    {action_respond_info("Target Nozzle: %d°C" % target_temp)}
    {action_respond_info("Type Code: %s" % current_type)}
    {action_respond_info("="*60)}
    
    # Preheat to initial temperature
    M104 S{150}
    HOME_CHECK
    G90
    PARKFRONT
    
    # Heat to target temperature
    M104 S{target_temp}
    SET_DISPLAY_TEXT MSG="Heating {current_type}..."
    {action_respond_info("Heating nozzle to %d°C..." % target_temp)}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_temp - tolerance} MAXIMUM={target_temp + tolerance}
    
    # Load filament
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Loading {current_type}..."
    {action_respond_info("Loading filament...")}
    
    G91
    G92 E0
    G1 E{load_distance} F{max_velocity}          # fast-load
    G1 E{purge_distance} F{speed}                # purge
    G1 E-{retract_distance} F{max_velocity}      # fast-retract
    
    # Cleanup
    TURN_OFF_HEATERS
    STATUS_READY
    SET_DISPLAY_TEXT MSG="{current_type} loaded!"
    {action_respond_info("✓ Filament loaded successfully!")}
    
    RESTORE_GCODE_STATE NAME=load_state

#####################################################################
[gcode_macro UNLOAD_FILAMENT]
description: Unload filament - uses currently selected filament type
variable_unload_distance: 70
variable_purge_distance: 25

gcode:
    {% set current_type = printer["gcode_macro _CURRENT_FILAMENT"].type %}
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    # Validate and get current filament info from library
    {% if current_type not in filaments %}
        {action_raise_error("Invalid filament type set: %s. Run SET_FILAMENT_TYPE TYPE=<name> first." % current_type)}
    {% endif %}
    
    {% set info = filaments[current_type] %}
    {% set target_temp = info.temp %}
    {% set tolerance = info.tolerance %}
    {% set load_speed = info.load_speed %}
    {% set display_name = info.name %}
    
    {% set speed = params.SPEED|default(load_speed) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 60 %}
    
    SAVE_GCODE_STATE NAME=unload_state
    
    # Display unloading information
    SET_DISPLAY_TEXT MSG="UNLOAD: {current_type}"
    {action_respond_info("="*60)}
    {action_respond_info("UNLOADING FILAMENT: %s" % display_name)}
    {action_respond_info("="*60)}
    {action_respond_info("Target Nozzle: %d°C" % target_temp)}
    {action_respond_info("Type Code: %s" % current_type)}
    {action_respond_info("="*60)}
    
    # Preheat to initial temperature
    M104 S{150}
    HOME_CHECK
    G90
    PARKFRONT
    
    # Heat to target temperature
    M104 S{target_temp}
    SET_DISPLAY_TEXT MSG="Heating {current_type}..."
    {action_respond_info("Heating nozzle to %d°C..." % target_temp)}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={target_temp - tolerance} MAXIMUM={target_temp + tolerance}
    
    # Unload filament
    STATUS_PRINTING
    SET_DISPLAY_TEXT MSG="Unloading {current_type}..."
    {action_respond_info("Unloading filament...")}
    
    G91
    G92 E0
    G1 E{purge_distance} F{speed}                # purge
    G1 E-{unload_distance} F{max_velocity}       # fast-unload
    
    # Cleanup
    TURN_OFF_HEATERS
    STATUS_READY
    SET_DISPLAY_TEXT MSG="{current_type} unloaded!"
    {action_respond_info("✓ Filament unloaded successfully!")}
    
    RESTORE_GCODE_STATE NAME=unload_state

#####################################################################
[gcode_macro FILAMENT_CHANGE]
description: Complete filament change workflow - unload current and load new
gcode:
    {% set new_filament = params.NEW|default('')|string|upper %}
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    # Validate new filament type
    {% if new_filament == '' %}
        {action_raise_error("No filament type specified. Use: FILAMENT_CHANGE NEW=<filament_code>\nRun LIST_FILAMENTS to see options.")}
    {% endif %}
    
    {% if new_filament not in filaments %}
        {action_raise_error("Unknown filament type: %s" % new_filament)}
    {% endif %}
    
    # Unload current filament
    {action_respond_info("="*60)}
    {action_respond_info("STARTING FILAMENT CHANGE")}
    {action_respond_info("="*60)}
    {action_respond_info("Unloading current filament...")}
    UNLOAD_FILAMENT
    
    # Set new filament type
    {action_respond_info("Setting new filament type: %s" % new_filament)}
    SET_FILAMENT_TYPE TYPE={new_filament}
    
    # Load new filament
    {action_respond_info("Loading new filament...")}
    LOAD_FILAMENT
    
    {action_respond_info("="*60)}
    {action_respond_info("✓ FILAMENT CHANGE COMPLETE")}
    {action_respond_info("="*60)}

#####################################################################
[gcode_macro SELECT_FILAMENT]
description: Interactive filament selection menu
gcode:
    {% set filaments = printer["gcode_macro _FILAMENT_LIBRARY"].filaments %}
    
    SET_DISPLAY_TEXT MSG="SELECT FILAMENT"
    {action_respond_info("="*60)}
    {action_respond_info("FILAMENT SELECTION")}
    {action_respond_info("="*60)}
    {action_respond_info("")}
    
    {% set count = 0 %}
    {% for filament in filaments|sort %}
        {% set count = count + 1 %}
        {% set info = filaments[filament] %}
        {action_respond_info("[%d] %s (%s) - %d°C" % (count, info.name, filament, info.temp))}
    {% endfor %}
    
    {action_respond_info("")}
    {action_respond_info("Usage: SET_FILAMENT_TYPE TYPE=<code>")}
    {action_respond_info("="*60)}
